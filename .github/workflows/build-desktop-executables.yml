name: Build desktop executables

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "avdbuddy-windows/**"
      - ".github/workflows/build-desktop-executables.yml"
  pull_request:
    paths:
      - "avdbuddy-windows/**"
      - ".github/workflows/build-desktop-executables.yml"

permissions:
  contents: read

concurrency:
  group: build-desktop-executables-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Bun tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: avdbuddy-windows
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun tests
        run: bun test

  build:
    name: Build ${{ matrix.label }} executable
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-latest
            artifact_prefix: stable-linux-x64
            artifact_name: avdbuddy-linux-x64
          - label: Windows x64
            runner: windows-latest
            artifact_prefix: stable-win-x64
            artifact_name: avdbuddy-windows-x64
    defaults:
      run:
        working-directory: avdbuddy-windows
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build stable executable bundle
        run: bun run build --env=stable

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: avdbuddy-windows/artifacts/${{ matrix.artifact_prefix }}-*
          if-no-files-found: error
          retention-days: 14
